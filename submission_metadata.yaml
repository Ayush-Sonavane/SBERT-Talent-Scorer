ai_usage_summary: |
  Used AI assistance for design, structural planning, and creating test-driven modules. No candidate data was sent to external LLMs.

methodology_summary: |
  A two-stage hybrid ranker designed for high-throughput screening on CPU. 
  Stage 1 filters the 100K candidates down to ~2,000 matches using fast title alignment, experience range gating, services-only exclusions, and strict consistency honeypot checks. 
  Stage 2 loads a local sentence-transformer model ('all-MiniLM-L6-v2') offline to compute dense similarity scores, which are combined with behavioral platform signals (responsiveness, availability) as multiplicative modifiers.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
